# Local dev stack for the OpenLDR CE skeleton (health acceptance).
# Host ports avoid common sibling project defaults such as Postgres 5432,
# Keycloak/app servers on 8080, MinIO 9000/9001, and SQL Server 1433.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openldr
      POSTGRES_PASSWORD: openldr
      POSTGRES_DB: openldr
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openldr"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./scripts/init-target-db.sql:/docker-entrypoint-initdb.d/10-init-target-db.sql:ro

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9010:9000"
      - "9011:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do echo 'waiting for minio'; sleep 2; done &&
      mc mb --ignore-existing local/openldr &&
      echo 'bucket ready'"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"

  # Optional SQL Server target store. Off by default; start with:
  #   docker compose --profile mssql up -d
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles: ["mssql"]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_PASSWORD:-Openldr_Local_2026!}
    ports:
      - "11433:1433"

  # Optional DHIS2 aggregate reporting target. Off by default; start with:
  #   pnpm dhis2:seed   (downloads the SL demo dump once)
  #   docker compose --profile dhis2 up -d
  dhis2-db:
    image: postgis/postgis:14-3.3
    profiles: ["dhis2"]
    environment:
      POSTGRES_USER: dhis
      POSTGRES_PASSWORD: dhis
      POSTGRES_DB: dhis2
    volumes:
      - ./.dhis2-seed/dump.sql.gz:/docker-entrypoint-initdb.d/10-dhis2.sql.gz:ro
  dhis2-web:
    image: dhis2/core:2.40.3
    profiles: ["dhis2"]
    depends_on: [dhis2-db]
    environment:
      DHIS2_HOME: /opt/dhis2
    volumes:
      - ./scripts/dhis2.conf:/opt/dhis2/dhis.conf:ro
    ports:
      - "8085:8080"
