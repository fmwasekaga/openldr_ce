server {
    listen 80;
    server_name _;

    # The SPA is built with Vite base '/studio/', so all asset URLs are /studio/...
    # dist is copied to /usr/share/nginx/html/studio, and root maps /studio/* → that dir.
    location /studio/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /studio/index.html;
    }

    # nginx's default mime.types has no `.mjs` entry, so ES module assets (e.g.
    # pdf.js's pdf.worker.min-*.mjs) would be served as application/octet-stream,
    # which browsers refuse to import as a module — breaking the reports PDF tab
    # ("Could not render the PDF"). Force a JavaScript MIME for .mjs. The regex
    # location takes precedence over the /studio/ prefix location for these files.
    location ~* \.mjs$ {
        root /usr/share/nginx/html;
        default_type text/javascript;
        try_files $uri =404;
    }

    # Container-local health (the gateway routes the app's /health to the api, not here).
    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
}
