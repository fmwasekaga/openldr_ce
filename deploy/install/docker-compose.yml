# Installer-target stack: pulls the published ghcr.io/open-laboratory-data-repository/openldr-* images and
# mounts only the config files the installer downloads next to this file.
# Do not use build: here.
services:
  api:
    image: ghcr.io/open-laboratory-data-repository/openldr-api:${OPENLDR_VERSION:-latest}
    env_file: .env
    expose: ["3000"]
    volumes:
      - ./config/nginx/certs/fullchain.pem:/etc/openldr/tls-cert.pem:ro
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_started }
      keycloak: { condition: service_healthy }
    restart: unless-stopped

  studio:
    image: ghcr.io/open-laboratory-data-repository/openldr-studio:${OPENLDR_VERSION:-latest}
    expose: ["80"]
    restart: unless-stopped

  web:
    image: ghcr.io/open-laboratory-data-repository/openldr-web:${OPENLDR_VERSION:-latest}
    expose: ["80"]
    restart: unless-stopped

  gateway:
    image: ghcr.io/open-laboratory-data-repository/openldr-gateway:${OPENLDR_VERSION:-latest}
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
    ports:
      - "${GATEWAY_HTTP_PORT:-80}:80"
      - "${GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - ./config/nginx/certs:/etc/nginx/certs:ro
      - certbot-www:/var/www/certbot
    depends_on:
      api: { condition: service_started }
      studio: { condition: service_started }
      web: { condition: service_started }
      keycloak: { condition: service_healthy }
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openldr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openldr}
      POSTGRES_DB: openldr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openldr"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./config/init-target-db.sql:/docker-entrypoint-initdb.d/10-init-target-db.sql:ro
      # Keycloak's database lives in THIS Postgres too (no second Postgres). Created on first init.
      - ./config/init-keycloak-db.sql:/docker-entrypoint-initdb.d/20-init-keycloak-db.sql:ro
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on: ["minio"]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin}; do echo 'waiting for minio'; sleep 2; done &&
      mc mb --ignore-existing local/${S3_BUCKET:-openldr} &&
      echo 'bucket ready'"

  # Renders the themed login page once, after Keycloak is healthy, so the first real user never
  # pays the cold FreeMarker compile. Best-effort — never fails the stack. Internal back-channel;
  # redirect_uri http://localhost/* is registered in the base realm, so Keycloak returns the login
  # page (200) and compiles the theme rather than an invalid_redirect error.
  keycloak-warmup:
    image: curlimages/curl:latest
    depends_on:
      keycloak: { condition: service_healthy }
    entrypoint:
      - sh
      - -c
      - "curl -fsS -o /dev/null 'http://keycloak:8080/auth/realms/openldr/protocol/openid-connect/auth?client_id=openldr-web&response_type=code&scope=openid&redirect_uri=http%3A%2F%2Flocalhost%2Fstudio' || true; echo 'login theme warmed'"
    restart: "no"

  keycloak:
    image: ghcr.io/open-laboratory-data-repository/openldr-keycloak:${OPENLDR_VERSION:-latest}
    # Production mode (`start`, not `start-dev`): persistent Postgres store instead of the throwaway H2
    # dev database. The stock image isn't pre-built for a specific DB vendor, so `start` (without
    # `--optimized`) auto-runs the build for KC_DB=postgres on boot. --import-realm still applies on the
    # first boot into an empty keycloak database.
    command: start --import-realm --http-relative-path=/auth
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Reuse the shared internal Postgres (service `postgres`), DB `keycloak`, as the openldr role.
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: openldr
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-openldr}
      KC_HOSTNAME: ${KC_HOSTNAME:-https://localhost/auth}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    depends_on:
      # Wait for Postgres to be healthy so the keycloak database (created by the first-init script) exists.
      postgres: { condition: service_healthy }
    volumes:
      - ./config/keycloak/openldr-realm.json:/opt/keycloak/data/import/openldr-realm.json:ro
    expose: ["8080"]
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q UP <&3"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  # Let's Encrypt helper (profile-gated: does NOT start with `up`). Invoked by the installer's
  # --letsencrypt flag and by renew-cert.sh (cron). Issued certs land in ./config/nginx/certs,
  # where the gateway reads them; the shared certbot-www volume carries the http-01 challenge.
  certbot:
    image: certbot/certbot:latest
    profiles: ["letsencrypt"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./config/nginx/certs:/certs-out
      - certbot-www:/var/www/certbot

volumes:
  pgdata:
  miniodata:
  certbot-www:
  letsencrypt:
