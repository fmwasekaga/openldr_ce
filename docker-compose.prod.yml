# Single-HTTPS-port production stack: gateway (TLS) -> web (landing) + studio (SPA) + api
# + Keycloak (under /auth) + backing services. Only gateway publishes host ports.
# Usage:
#   pnpm run init            # interactive: writes .env.prod + certs, brings this up
#   # or manually:
#   cp .env.prod.example .env.prod && edit; sh deploy/nginx/gen-selfsigned.sh localhost
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file: .env.prod
    expose: ["3000"]
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_started }
      keycloak: { condition: service_started }
    restart: unless-stopped

  studio:
    build:
      context: .
      dockerfile: apps/studio/Dockerfile
    expose: ["80"]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    expose: ["80"]
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
    ports:
      - "${GATEWAY_HTTP_PORT:-80}:80"
      - "${GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      # Render AS default.conf so it replaces the stock nginx welcome config (which also
      # matches server_name localhost and would otherwise win on :80).
      - ./deploy/nginx/openldr.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - certbot-www:/var/www/certbot
    depends_on: ["api", "studio", "web", "keycloak"]
    restart: unless-stopped

  # Let's Encrypt helper (profile-gated: does NOT start with `up`). Invoked ad-hoc by
  # `deploy/letsencrypt.sh` (or `pnpm run cert`) to issue/renew a cert over the webroot nginx
  # already serves on :80, copy the pems into deploy/nginx/certs (where nginx reads them), and
  # reload nginx. `letsencrypt` volume persists the ACME account + certs across runs (renewal).
  certbot:
    image: certbot/certbot:latest
    profiles: ["letsencrypt"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./deploy/nginx/certs:/certs-out
      - certbot-www:/var/www/certbot

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openldr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openldr}
      POSTGRES_DB: openldr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openldr"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-target-db.sql:/docker-entrypoint-initdb.d/10-init-target-db.sql:ro
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on: ["minio"]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin}; do echo 'waiting for minio'; sleep 2; done &&
      mc mb --ignore-existing local/${S3_BUCKET:-openldr} &&
      echo 'bucket ready'"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm --http-relative-path=/auth
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: ${KC_HOSTNAME:-https://localhost/auth}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./infra/keycloak/openldr-realm.json:/opt/keycloak/data/import/openldr-realm.json:ro
    expose: ["8080"]
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  certbot-www:
  letsencrypt:
